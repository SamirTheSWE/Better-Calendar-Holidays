ci:
    autoupdate_commit_msg: "chore(pre-commit): pre-commit autoupdate"
    autofix_commit_msg: "style(pre-commit): auto fixes from pre-commit hooks"
repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v4.6.0
      hooks:
          - id: end-of-file-fixer
          - id: trailing-whitespace

    - repo: https://github.com/asottile/add-trailing-comma
      rev: v3.1.0
      hooks:
          - id: add-trailing-comma

    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.12.0
      hooks:
          - id: ruff-check
            args: [--fix]
            files: ^backend/src/.*\.py$
          - id: ruff-format
            files: ^backend/src/.*\.py$

    - repo: local
      hooks:
          - id: backend-mypy
            name: backend mypy
            entry: bash -c 'cd backend && mypy src'
            language: system
            pass_filenames: false
          - id: frontend-lint
            name: frontend lint
            entry: bash -c 'cd frontend && pnpm lint'
            language: system
            pass_filenames: false
          - id: frontend-format-check
            name: frontend prettier check
            entry: bash -c 'cd frontend && pnpm format:check'
            language: system
            pass_filenames: false
          - id: frontend-stylelint
            name: frontend stylelint
            entry: bash -c 'cd frontend && pnpm stylelint'
            language: system
            pass_filenames: false
